schema: spec-driven

context: |
  Stack: Astro 7.0.9 (static), Tailwind CSS 4 via @tailwindcss/vite, Alpine.js 3, Swiper 12,
  @lucide/astro, Sharp, Zod, schema-dts. pnpm only (npm/npx forbidden; guard + .npmrc + devEngines).
  Architecture: multipage Astro site (src/pages/*.astro); layout/sections/seo/ui components under src/components/.
  Data contract: 12 typed JSON files under src/data/*.json with Zod validation (business, site, navigation,
  hero, services, gallery, testimonials, faq, areas, directories, blog, landings). Preserve schema per AGENTS.md.
  Monorepo: packages/create-contractor-site scaffolds client sites (copy + JSON replace + pnpm install/build + git).
  Testing: pnpm run test:cli (Node smoke script, CLI package only); template site has no test framework.

strict_tdd: false

testing:
  strict_tdd: false
  detected: 2026-07-20
  test_runner:
    command: "pnpm run test:cli"
    framework: "node:assert smoke script (packages/create-contractor-site only)"
  layers:
    unit: false
    integration: true
    e2e: true
  coverage:
    available: false
    command: ""
  quality:
    linter:
      available: false
      command: ""
    type_checker:
      available: true
      command: "pnpm exec astro check"
    formatter:
      available: false
      command: ""
  notes: >
    The template site (src/) has no unit/integration/e2e framework (no vitest, jest,
    playwright, or cypress). `pnpm run test:cli` runs a committed Node built-ins smoke
    script (packages/create-contractor-site/scripts/smoke-test.mjs) covering CLI arg
    validation, service/area normalization, JSON replacement alignment, and an opt-out
    full temp-target scaffold E2E (skip via SKIP_CLI_E2E=1). Coverage applies to the CLI
    package only, not the Astro template. `astro check` provides template type diagnostics.

rules:
  proposal:
    - Use pnpm-only commands in any proposed workflow; npm/npx is forbidden (AGENTS.md).
    - Preserve the template's neutral/placeholder-only content unless the task explicitly targets a client build.
    - Include rollback plan for risky changes.
  specs:
    - Use Given/When/Then for scenarios.
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY).
    - Treat the 12 src/data/*.json files as a stable contract: preserve top-level keys, nested object shape, required arrays, and _instructions blocks.
  design:
    - Document impact on the JSON data contract explicitly (additive vs shape-breaking).
    - Note any change to pnpm/.npmrc/pnpm-workspace.yaml enforcement files as high-risk.
  tasks:
    - Group by phase, use hierarchical numbering.
    - Keep tasks completable in one session.
  apply:
    rules:
      - Follow existing Astro component patterns (layout/ vs sections/ split).
    tdd: false
    test_command: ""
  verify:
    test_command: ""
    build_command: "pnpm run build"
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas to the JSON data contract.
